<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VivaMate AI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 42px;
            margin: 0;
            color: #4f46e5;
        }

        .subtitle {
            color: #6b7280;
            font-size: 18px;
        }

        .card,
        .answer-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: white;
            font-size: 16px;
            outline: none;
        }

        select:focus,
        textarea:focus {
            border-color: #4f46e5;
        }

        textarea {
            width: 100%;
            min-height: 130px;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            resize: vertical;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .answer-card {
            display: none;
            margin-top: 25px;
        }

        .answer-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .answer-info {
            color: #4f46e5;
            font-weight: bold;
            text-align: right;
        }

        #answer {
            white-space: pre-wrap;
            line-height: 1.7;
        }

        .loading {
            color: #4f46e5;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
            }

            .logo {
                font-size: 34px;
            }

            .card,
            .answer-card {
                padding: 18px;
            }

            .answer-heading {
                display: block;
            }

            .answer-info {
                text-align: left;
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header class="header">
            <h1 class="logo">VivaMate AI</h1>
            <p class="subtitle">Your Engineering Exam Assistant</p>
        </header>

        <div class="card">

            <label for="subject">Select Subject</label>

            <select id="subject">
                <option value="General Engineering">
                    General Engineering
                </option>

                <option value="Artificial Intelligence">
                    Artificial Intelligence
                </option>

                <option value="Basic Electronics">
                    Basic Electronics
                </option>

                <option value="Python Programming">
                    Python Programming
                </option>

                <option value="Engineering Mathematics">
                    Engineering Mathematics
                </option>

                <option value="Engineering Physics">
                    Engineering Physics
                </option>
            </select>


            <label for="marks">Select Answer Marks</label>

            <select id="marks">
                <option value="2">2 Marks</option>
                <option value="5" selected>5 Marks</option>
                <option value="10">10 Marks</option>
            </select>


            <textarea
                id="question"
                placeholder="Ask an engineering exam question..."
            ></textarea>


            <button id="askButton" onclick="askVivaMate()">
                Ask VivaMate
            </button>

        </div>


        <div id="answerCard" class="answer-card">

            <div class="answer-heading">

                <h2>Exam Answer</h2>

                <div class="answer-info">
                    <div id="selectedSubject"></div>
                    <div id="selectedMarks"></div>
                </div>

            </div>

            <div id="answer"></div>

        </div>

    </div>


    <script>

        const API_URL =
            "https://zany-computing-machine-69j46xg7qwgr354x7-8000.app.github.dev/ask";


        async function askVivaMate() {

            const question =
                document.getElementById("question").value.trim();

            const marks =
                parseInt(document.getElementById("marks").value);

            const subject =
                document.getElementById("subject").value;

            const answer =
                document.getElementById("answer");

            const answerCard =
                document.getElementById("answerCard");

            const selectedMarks =
                document.getElementById("selectedMarks");

            const selectedSubject =
                document.getElementById("selectedSubject");

            const button =
                document.getElementById("askButton");


            if (!question) {
                alert("Please enter a question.");
                return;
            }


            answerCard.style.display = "block";

            selectedSubject.innerText = subject;

            selectedMarks.innerText =
                marks + " Marks Answer";

            answer.className = "loading";

            answer.innerText =
                "VivaMate is preparing your exam answer...";

            button.disabled = true;

            button.innerText = "Thinking...";


            try {

                const response = await fetch(API_URL, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        question: question,
                        marks: marks,
                        subject: subject
                    })

                });


                const data = await response.json();


                if (!response.ok) {
                    throw new Error(
                        data.detail || "API request failed"
                    );
                }


                answer.className = "";

                answer.innerText =
                    data.answer || "No answer received.";


            } catch (error) {

                answer.className = "";

                answer.innerText =
                    "Error: " + error.message;

            } finally {

                button.disabled = false;

                button.innerText = "Ask VivaMate";

            }

        }

    </script>

</body>

</html>
